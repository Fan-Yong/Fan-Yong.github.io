*/

/* The switch - the box around the slider */
label.tc-tiddlyflex-ui-form-switch {
	position: relative;
	display: inline-block;
	width: 36px;
	height: 12px;
}/* Hide default HTML checkbox */
label.tc-tiddlyflex-ui-form-switch input {
	opacity: 0;
	width: 0;
	height: 0;
}/* The slider */
label.tc-tiddlyflex-ui-form-switch span {
	position: absolute;
	cursor: pointer;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background-color: #c0c4bb;
	-webkit-transition: .2s;
	transition: .2s;
}label.tc-tiddlyflex-ui-form-switch span:before {
	position: absolute;
	content: "";
	height: 20px;
	width: 20px;
	left: -1px;
	top: -4px;
	bottom: 4px;
	background-color: #fdf6e3;
	-webkit-transition: .2s;
	transition: .2s;
	box-shadow: 0 1px 3px 0 rgba(0,0,0,0.7);
}label.tc-tiddlyflex-ui-form-switch input:checked + span {
	background-color: rgba(26,115,232,0.5);
}label.tc-tiddlyflex-ui-form-switch input:checked + span:before {
	background-color: rgb(26,115,232);
	opacity: 1;
}label.tc-tiddlyflex-ui-form-switch input:focus + span {
	box-shadow: 0 0 1px #2196F3;
}label.tc-tiddlyflex-ui-form-switch input:checked + span:before {
	-webkit-transform: translateX(17px);
	-ms-transform: translateX(17px);
	transform: translateX(17px);
}label.tc-tiddlyflex-ui-form-switch span {
	border-radius: 12px;
}label.tc-tiddlyflex-ui-form-switch span:before {
	border-radius: 50%;

/*Eliminate border in table and cells*/
.ihm-tgr-table {
   border-collapse: collapse;
   border: none;
   background-color: transparent;
   padding: 0;
   margin: 0;
}

.ihm-tgr-tablediv {
   /* We need this margin to prevent spurius vertical scroll
   * in tgr-container. It needs to have the SAME pixel value
   * as top and left in tgr-svg-int class so that the SVG
   * arrows match properly (this assures same origin coordinates
   * for table and svg)
   */
   margin: 10px; 
}

.tgr-container table  td {
   border: none;
   background-color: transparent;
}

/*nice round box around tiddlers*/
.tgr-container td  a  {
 
}

.tgr-container {
   position:relative; 
   left:0px; 
   top:0px; 
   background-color: transparent;
   overflow: auto; /* This is needed to scroll on big maps */
   z-index:1;
}
.tgr-svg-int { 
	z-index: -1;
	position:absolute;
	background-color:transparent;
	opacity: 1;
   left: 10px;
   top: 10px;
}

/* SVG arrows */
.ihm-tgr-link {
   fill: none;
   stroke-width: 2;
   stroke: #aeb0b5;
}

.tgr-edge-weak {
   stroke-dasharray: 3,5;
}

.tgr-arrow {
   fill: #aeb0b5;
   stroke-width: 0;
}

.ihm-tgr-node-container {
   position: relative;
}

.ihm-tgr-node-container-east {
   margin: 6px 10px;
}

.ihm-tgr-node-container-south {
   margin: 16px 4px;
   display: inline-block; /*FIXME*/
}

.ihm-tgr-node-container p {
   margin-top: 0px;
   margin-bottom: 0px;
}

.ihm-tgr-node {
   background-color: #dce4ef;
   border-radius: 15px;
   padding: 0.1em 0.4em;
   /* border: 0px dashed #cd2026; */
   box-shadow: 4px 4px 5px #888888;
   text-align: center;
   vertical-align: middle;
   font-size: 1em;
   color: #0071bc;
}

/* Collapse feature */
.ihm-tgr-collapse {
    position: absolute;
    cursor: pointer;
    width: 14px;
    height: 14px;
    right: -14px;
}

.ihm-tgr-collapse-east {
    top: 50%;
    transform: translateY(-50%);
    -ms-transform: translateY(-50%);
    -webkit-transform: translateY(-50%);
}

.ihm-tgr-collapse-south {
    left: 50%;
    transform: translateX(-50%);
    -ms-transform: translateX(-50%);
    -webkit-transform: translateX(-50%);
}

a.ihm-tgr-collapse:hover {
    text-decoration: none;
    background: #999999;
}

/* Vertical layout divs */
.ihm-tgr-divtable {
   display: table;
}

.ihm-tgr-node-group {
   display: table-row;
}

.ihm-tgr-node-cell {
   display: table-cell;
   vertical-align: top;
   text-align: center;
}

  font-size: 14px;

}

/** https://www.w3schools.com/howto/howto_css_switch.asp **/
/* The switch - the box around the slider */
label.btcui-form-switch {
	position: relative;
	display: inline-block;
	width: 36px;
	height: 12px;
}/* Hide default HTML checkbox */
label.btcui-form-switch input {
	opacity: 0;
	width: 0;
	height: 0;
}/* The slider */
label.btcui-form-switch span {
	position: absolute;
	cursor: pointer;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	background-color: #c0c4bb;
	-webkit-transition: .2s;
	transition: .2s;
}label.btcui-form-switch span:before {
	position: absolute;
	content: "";
	height: 20px;
	width: 20px;
	left: -1px;
	top: -4px;
	bottom: 4px;
	background-color: #fdf6e3;
	-webkit-transition: .2s;
	transition: .2s;
	box-shadow: 0 1px 3px 0 rgba(0,0,0,0.7);
}label.btcui-form-switch input:checked + span {
	background-color: rgba(26,115,232,0.5);
}label.btcui-form-switch input:checked + span:before {
	background-color: rgb(26,115,232);
	opacity: 1;
}label.btcui-form-switch input:focus + span {
	box-shadow: 0 0 1px #2196F3;
}label.btcui-form-switch input:checked + span:before {
	-webkit-transform: translateX(17px);
	-ms-transform: translateX(17px);
	transform: translateX(17px);
}label.btcui-form-switch span {
	border-radius: 12px;
}label.btcui-form-switch span:before {
	border-radius: 50%;
}div.btcui-form-label {}/*** checkbox switches end ***//** form select elements **/

	background-color: rgb(241,243,244);
	background-size: 10px;
	border: none;
	border-radius: 4px;
	color: rgb(32,33,36);
	cursor: pointer;
	max-width: 100%;
	outline: none;
	padding: 6px 21px 6px 8px;
/*	width: 200px;*/
}input.btcui-form-input {
	border: 1px solid #c0c4bb;
	border-radius: 3px;
	background-color: #fdf6e3;
	padding: 6px;
	color: #657b83;
}input.btcui-form-input:focus {
	outline-color: #ccc;
}.btc-list-group {
	display: flex;
	flex-direction: column;
	padding-left: 0;
	margin-bottom: 0;
	box-sizing: border-box;
}.btc-list-group-box-shadow {
	box-shadow:1px 1px 5px rgba(0, 0, 0, 0.3);
	border-bottom-left-radius: .25rem;
	border-bottom-right-radius: .25rem;
	border-top-left-radius: .25rem;
	border-top-right-radius: .25rem;
}.btc-list-group-item {
	position: relative;
	display: block;
	
	padding: 0 20px;
	background-color:  #fdf6e3;

.list-tree, .list-tree ul, .list-tree li { position: relative; }

.list-tree li::before, .list-tree li::after {
    content: "";
    position: absolute;
    left: -1em;
}

/* horizontal line */
.list-tree li::before {
    border-bottom: 1px solid silver;
    top: .6em; 
    width: 7px;
}

/* vertical line */
.list-tree ul li::after {
    border-left: 1px solid silver;
    height: 100%;
    top: .1em;
}

.list-tree ul > li:last-child::after { height: .5em; }

/* top-level: Lines if multiple top elements. No lines if single top element. */

.list-tree > li:last-of-type:before { display:none; }

.list-tree > li:first-of-type:before { border-top: 1px solid silver; }
